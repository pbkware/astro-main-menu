<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <!-- Background: rounded square with Astro-like purple gradient -->
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#BC52EE"/>
            <stop offset="100%" stop-color="#7C2CB8"/>
        </linearGradient>
    </defs>

    <!-- Rounded background tile -->
    <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)"/>

    <!-- Hamburger / menu lines in white -->
    <g fill="#FFFFFF">
        <!-- Top bar -->
        <rect x="14" y="18" width="36" height="5" rx="2.5"/>
        <!-- Middle bar -->
        <rect x="14" y="29.5" width="36" height="5" rx="2.5"/>
        <!-- Bottom bar (shorter, suggesting the active/expanded item) -->
        <rect x="14" y="41" width="22" height="5" rx="2.5"/>
    </g>

    <!-- Dropdown indicator: small chevron/triangle pointing down,
       suggesting the 2-level submenu capability -->
    <path d="M44 43 L52 43 L48 48 Z" fill="#FFD6FF"/>
</svg>
